type: http
name: Submit adjudication decision
url: '{{baseUrl}}/claims/:claimId/adjudicate'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: claimId
    value: string
body:
  type: json
  content: |-
    {
      "decision": "partial_approval",
      "approvedAmount": 3239.3482839934395,
      "adjusterNotes": "string",
      "denialReason": "string",
      "isAutomated": false
    }
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "claimId": "string",
            "decision": "string",
            "approvedAmount": 9321.430285219849,
            "adjudicatedAt": "2004-05-14T03:31:49.338Z",
            "adjusterNotes": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Adjudication recorded
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Claim not found
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: text
        content: ''
    name: Claim already adjudicated
