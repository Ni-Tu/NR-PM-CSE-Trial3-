type: http
name: Process claim settlement
url: '{{baseUrl}}/claims/:claimId/settlement'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
pathVariables:
  - key: claimId
    value: string
body:
  type: json
  content: |-
    {
      "paymentMethod": "wire",
      "amount": 226.57842752760615,
      "payeeName": "string",
      "payeeAccountId": "string"
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "claimId": "string",
            "amount": 6016.508335604849,
            "paymentMethod": "string",
            "status": "initiated",
            "initiatedAt": "1968-12-30T06:33:45.305Z",
            "completedAt": "1971-05-15T22:30:06.784Z",
            "referenceNumber": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Settlement initiated
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: text
        content: ''
    name: Claim not eligible for settlement
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: Claim not found
