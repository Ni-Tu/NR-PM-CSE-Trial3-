type: http
name: Get settlement status
url: '{{baseUrl}}/claims/:claimId/settlement'
method: GET
headers:
  - key: Accept
    value: application/json
pathVariables:
  - key: claimId
    value: string
examples:
  - response:
      statusCode: 200
      statusText: OK
      body:
        type: json
        content: |-
          {
            "claimId": "string",
            "amount": 6016.508335604849,
            "paymentMethod": "string",
            "status": "initiated",
            "initiatedAt": "1968-12-30T06:33:45.305Z",
            "completedAt": "1971-05-15T22:30:06.784Z",
            "referenceNumber": "string"
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Settlement details
  - response:
      statusCode: 404
      statusText: Not Found
      body:
        type: text
        content: ''
    name: No settlement found for this claim
