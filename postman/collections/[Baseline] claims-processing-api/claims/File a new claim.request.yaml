type: http
name: File a new claim
url: '{{baseUrl}}/claims'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "policyId": "pol_auto_12345",
      "lineOfBusiness": "auto",
      "incidentDate": "2026-02-15",
      "description": "Rear-end collision at intersection",
      "estimatedDamage": 8500,
      "claimantContact": {
        "name": "Jane Smith",
        "phone": "+1-555-0123",
        "email": "jane.smith@example.com"
      }
    }
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "policyId": "string",
            "lineOfBusiness": "string",
            "status": "triaged",
            "incidentDate": "1953-11-15",
            "description": "string",
            "estimatedDamage": 5729.876428870608,
            "filedAt": "2015-04-24T05:27:36.481Z",
            "updatedAt": "1993-05-09T06:56:36.005Z",
            "assignedAdjuster": "string",
            "adjudication": {
              "claimId": "string",
              "decision": "string",
              "approvedAmount": 3440.0085489413314,
              "adjudicatedAt": "1976-10-19T15:02:57.878Z",
              "adjusterNotes": "string"
            },
            "settlement": {
              "claimId": "string",
              "amount": 9536.055799359576,
              "paymentMethod": "string",
              "status": "completed",
              "initiatedAt": "1951-10-16T14:50:24.559Z",
              "completedAt": "2011-08-17T05:07:16.204Z",
              "referenceNumber": "string"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Claim filed successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid claim data
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: text
        content: ''
    name: Duplicate claim for this incident
